name: Build

on:
  push:
    tags: ['v*']
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  build-macos-arm:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin
      - name: Build
        run: cargo build --release --target aarch64-apple-darwin
      - name: Bundle app
        run: |
          APP_DIR="MdViewer.app"
          mkdir -p "$APP_DIR/Contents/MacOS"
          mkdir -p "$APP_DIR/Contents/Resources"
          cp target/aarch64-apple-darwin/release/mdview "$APP_DIR/Contents/MacOS/"
          cp assets/mdview.icns "$APP_DIR/Contents/Resources/"
          cat > "$APP_DIR/Contents/Info.plist" << 'PLIST'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>CFBundleName</key><string>MdViewer</string>
              <key>CFBundleDisplayName</key><string>MdViewer</string>
              <key>CFBundleIdentifier</key><string>com.mdviewer.app</string>
              <key>CFBundleVersion</key><string>0.1.0</string>
              <key>CFBundleShortVersionString</key><string>0.1.0</string>
              <key>CFBundlePackageType</key><string>APPL</string>
              <key>CFBundleExecutable</key><string>mdview</string>
              <key>CFBundleIconFile</key><string>mdview</string>
              <key>CFBundleIconName</key><string>mdview</string>
              <key>NSHighResolutionCapable</key><true/>
              <key>LSMinimumSystemVersion</key><string>11.0</string>
              <key>CFBundleDocumentTypes</key>
              <array>
                  <dict>
                      <key>CFBundleTypeName</key><string>Markdown Document</string>
                      <key>CFBundleTypeRole</key><string>Viewer</string>
                      <key>LSHandlerRank</key><string>Alternate</string>
                      <key>CFBundleTypeExtensions</key>
                      <array>
                          <string>md</string>
                          <string>markdown</string>
                      </array>
                  </dict>
              </array>
          </dict>
          </plist>
          PLIST
          tar czf MdViewer-macos-arm64.tar.gz MdViewer.app
      - uses: actions/upload-artifact@v4
        with:
          name: MdViewer-macos-arm64
          path: MdViewer-macos-arm64.tar.gz

  build-windows-x64:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc
      - name: Install WebView2
        run: |
          Invoke-WebRequest -Uri "https://go.microsoft.com/fwlink/p/?LinkId=2124703" -OutFile "$env:TEMP\MicrosoftEdgeWebview2Setup.exe"
          Start-Process -FilePath "$env:TEMP\MicrosoftEdgeWebview2Setup.exe" -ArgumentList "/silent", "/install" -Wait
        shell: pwsh
      - name: Build
        run: cargo build --release --target x86_64-pc-windows-msvc
      - name: Package
        run: |
          mkdir dist
          copy target\x86_64-pc-windows-msvc\release\mdview.exe dist\
          cd dist && tar -a -cf ..\MdViewer-windows-x64.zip mdview.exe
        shell: cmd
      - uses: actions/upload-artifact@v4
        with:
          name: MdViewer-windows-x64
          path: MdViewer-windows-x64.zip

  build-windows-arm:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-pc-windows-msvc
      - name: Install WebView2
        run: |
          Invoke-WebRequest -Uri "https://go.microsoft.com/fwlink/p/?LinkId=2124703" -OutFile "$env:TEMP\MicrosoftEdgeWebview2Setup.exe"
          Start-Process -FilePath "$env:TEMP\MicrosoftEdgeWebview2Setup.exe" -ArgumentList "/silent", "/install" -Wait
        shell: pwsh
      - name: Build
        run: cargo build --release --target aarch64-pc-windows-msvc
      - name: Package
        run: |
          mkdir dist
          copy target\aarch64-pc-windows-msvc\release\mdview.exe dist\
          cd dist && tar -a -cf ..\MdViewer-windows-arm64.zip mdview.exe
        shell: cmd
      - uses: actions/upload-artifact@v4
        with:
          name: MdViewer-windows-arm64
          path: MdViewer-windows-arm64.zip

  build-linux-x64:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-gnu
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev
      - name: Build
        run: cargo build --release --target x86_64-unknown-linux-gnu
      - name: Package
        run: |
          mkdir -p dist
          cp target/x86_64-unknown-linux-gnu/release/mdview dist/
          cp assets/mdview.iconset/icon_256x256.png dist/mdview.png
          tar czf MdViewer-linux-x64.tar.gz -C dist .
      - uses: actions/upload-artifact@v4
        with:
          name: MdViewer-linux-x64
          path: MdViewer-linux-x64.tar.gz

  build-linux-arm:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-unknown-linux-gnu
      - name: Install cross-compilation toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu g++-aarch64-linux-gnu
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev
      - name: Build
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc
        run: cargo build --release --target aarch64-unknown-linux-gnu
      - name: Package
        run: |
          mkdir -p dist
          cp target/aarch64-unknown-linux-gnu/release/mdview dist/
          cp assets/mdview.iconset/icon_256x256.png dist/mdview.png
          tar czf MdViewer-linux-arm64.tar.gz -C dist .
      - uses: actions/upload-artifact@v4
        with:
          name: MdViewer-linux-arm64
          path: MdViewer-linux-arm64.tar.gz

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build-macos-arm, build-windows-x64, build-windows-arm, build-linux-x64, build-linux-arm]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            MdViewer-macos-arm64/MdViewer-macos-arm64.tar.gz
            MdViewer-windows-x64/MdViewer-windows-x64.zip
            MdViewer-windows-arm64/MdViewer-windows-arm64.zip
            MdViewer-linux-x64/MdViewer-linux-x64.tar.gz
            MdViewer-linux-arm64/MdViewer-linux-arm64.tar.gz
