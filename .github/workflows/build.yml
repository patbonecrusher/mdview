name: Build

on:
  push:
    tags: ['v*']
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  build-macos-arm:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin
      - name: Build
        run: cargo build --release --target aarch64-apple-darwin
      - name: Import signing certificate
        env:
          MACOS_CERTIFICATE: ${{ secrets.MACOS_CERTIFICATE }}
          MACOS_CERTIFICATE_PWD: ${{ secrets.MACOS_CERTIFICATE_PWD }}
        run: |
          echo "$MACOS_CERTIFICATE" | base64 --decode > certificate.p12
          KEYCHAIN_PWD=$(uuidgen)
          security create-keychain -p "$KEYCHAIN_PWD" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "$KEYCHAIN_PWD" build.keychain
          security import certificate.p12 -k build.keychain -P "$MACOS_CERTIFICATE_PWD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PWD" build.keychain
          rm certificate.p12
      - name: Bundle, sign, and notarize
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
        run: |
          BINARY_PATH="target/aarch64-apple-darwin/release/mdview" bash bundle.sh

          # Notarize
          ditto -c -k --keepParent MdViewer.app MdViewer.zip
          xcrun notarytool submit MdViewer.zip \
            --apple-id "$APPLE_ID" \
            --team-id "$APPLE_TEAM_ID" \
            --password "$APPLE_APP_PASSWORD" \
            --wait
          xcrun stapler staple MdViewer.app
          rm MdViewer.zip

          tar czf MdViewer-macos-arm64.tar.gz MdViewer.app
      - uses: actions/upload-artifact@v4
        with:
          name: MdViewer-macos-arm64
          path: MdViewer-macos-arm64.tar.gz

  build-macos-swift:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - name: Build
        run: cd mdview-swift && swift build -c release
      - name: Import signing certificate
        env:
          MACOS_CERTIFICATE: ${{ secrets.MACOS_CERTIFICATE }}
          MACOS_CERTIFICATE_PWD: ${{ secrets.MACOS_CERTIFICATE_PWD }}
        run: |
          echo "$MACOS_CERTIFICATE" | base64 --decode > certificate.p12
          KEYCHAIN_PWD=$(uuidgen)
          security create-keychain -p "$KEYCHAIN_PWD" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "$KEYCHAIN_PWD" build.keychain
          security import certificate.p12 -k build.keychain -P "$MACOS_CERTIFICATE_PWD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PWD" build.keychain
          rm certificate.p12
      - name: Bundle, sign, and notarize
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
        run: |
          BINARY_PATH="mdview-swift/.build/release/MdViewer" bash bundle.sh

          # Notarize
          ditto -c -k --keepParent MdViewer.app MdViewer.zip
          xcrun notarytool submit MdViewer.zip \
            --apple-id "$APPLE_ID" \
            --team-id "$APPLE_TEAM_ID" \
            --password "$APPLE_APP_PASSWORD" \
            --wait
          xcrun stapler staple MdViewer.app
          rm MdViewer.zip

          tar czf MdViewer-macos-swift-arm64.tar.gz MdViewer.app
      - uses: actions/upload-artifact@v4
        with:
          name: MdViewer-macos-swift-arm64
          path: MdViewer-macos-swift-arm64.tar.gz

  build-windows-x64:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc
      - name: Build
        run: cargo build --release --target x86_64-pc-windows-msvc
      - name: Package
        run: |
          mkdir dist
          copy target\x86_64-pc-windows-msvc\release\mdview.exe dist\
          cd dist && tar -a -cf ..\MdViewer-windows-x64.zip mdview.exe
        shell: cmd
      - uses: actions/upload-artifact@v4
        with:
          name: MdViewer-windows-x64
          path: MdViewer-windows-x64.zip

  build-windows-arm:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-pc-windows-msvc
      - name: Build
        run: cargo build --release --target aarch64-pc-windows-msvc
      - name: Package
        run: |
          mkdir dist
          copy target\aarch64-pc-windows-msvc\release\mdview.exe dist\
          cd dist && tar -a -cf ..\MdViewer-windows-arm64.zip mdview.exe
        shell: cmd
      - uses: actions/upload-artifact@v4
        with:
          name: MdViewer-windows-arm64
          path: MdViewer-windows-arm64.zip

  build-linux-x64:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-gnu
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev libxdo-dev
      - name: Build
        run: cargo build --release --target x86_64-unknown-linux-gnu
      - name: Package
        run: |
          mkdir -p dist
          cp target/x86_64-unknown-linux-gnu/release/mdview dist/
          cp assets/mdview.iconset/icon_256x256.png dist/mdview.png
          tar czf MdViewer-linux-x64.tar.gz -C dist .
      - uses: actions/upload-artifact@v4
        with:
          name: MdViewer-linux-x64
          path: MdViewer-linux-x64.tar.gz

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build-macos-arm, build-macos-swift, build-windows-x64, build-windows-arm, build-linux-x64]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          gh release create "$TAG" \
            --title "MdViewer $TAG" \
            --generate-notes \
            MdViewer-macos-arm64/MdViewer-macos-arm64.tar.gz \
            MdViewer-macos-swift-arm64/MdViewer-macos-swift-arm64.tar.gz \
            MdViewer-windows-x64/MdViewer-windows-x64.zip \
            MdViewer-windows-arm64/MdViewer-windows-arm64.zip \
            MdViewer-linux-x64/MdViewer-linux-x64.tar.gz
